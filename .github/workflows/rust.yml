name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: renord.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: renord-mac-x86
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: renord-mac-arm
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: renord-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/renord* ${{ matrix.artifact }}

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
